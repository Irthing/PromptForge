<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptForge - 专业提示词工程工具包</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="bg-orb orb-pink"></div>
  <div class="bg-orb orb-blue"></div>
  <div class="bg-grid"></div>

  <div id="app" class="app-shell">
    <header class="app-header">
      <div class="header-left">
        <div class="brand-mark">PF</div>
        <div>
          <h1 class="logo">PromptForge</h1>
          <p class="tagline">专业提示词工程工具包</p>
        </div>
      </div>

      <div class="header-actions">
        <button id="refreshButton" class="btn btn-ghost" type="button">刷新数据</button>
        <button id="createTemplateButton" class="btn btn-primary" type="button">新建模板</button>
      </div>
    </header>

    <main class="app-main">
      <aside class="sidebar">
        <section class="glass-card search-panel">
          <label for="searchInput" class="section-label">模板搜索</label>
          <div class="search-box">
            <span class="search-icon">⌕</span>
            <input
              type="text"
              id="searchInput"
              placeholder="搜索名称、内容或标签"
              autocomplete="off"
            />
          </div>
        </section>

        <section class="glass-card category-panel">
          <div class="panel-title-row">
            <h2>分类筛选</h2>
            <span id="categoryCount" class="mini-badge">0</span>
          </div>
          <nav id="categoryFilterList" class="category-list"></nav>
        </section>
      </aside>

      <section class="content">
        <section class="stats-row">
          <article class="stat-card">
            <div class="stat-icon">✦</div>
            <div>
              <h3>模板总数</h3>
              <p id="analyticsTemplates">0</p>
            </div>
          </article>

          <article class="stat-card">
            <div class="stat-icon">⚡</div>
            <div>
              <h3>测试次数</h3>
              <p id="analyticsTests">0</p>
            </div>
          </article>

          <article class="stat-card">
            <div class="stat-icon">★</div>
            <div>
              <h3>平均得分</h3>
              <p id="analyticsAvgScore">0.00</p>
            </div>
          </article>
        </section>

        <section id="previewPanel" class="preview-panel glass-card hidden">
          <div class="panel-title-row">
            <div>
              <h2>渲染预览</h2>
              <p id="previewTemplateName" class="muted-text">选择模板后可输入变量并生成预览</p>
            </div>
            <button id="closePreviewButton" class="icon-button" type="button" aria-label="关闭预览">×</button>
          </div>

          <div class="preview-layout">
            <div class="context-box">
              <label for="contextInput">变量上下文</label>
              <textarea
                id="contextInput"
                rows="8"
                placeholder='请输入 JSON，例如：{"产品":"智能手表","受众":"年轻用户"}'
              ></textarea>
              <div class="preview-actions">
                <button id="renderPreviewButton" class="btn btn-primary" type="button">生成预览</button>
                <button id="clearContextButton" class="btn btn-secondary" type="button">清空变量</button>
              </div>
            </div>

            <div class="render-box">
              <div class="render-header">
                <span>输出结果</span>
                <button id="copyPreviewButton" class="btn-small" type="button">复制</button>
              </div>
              <pre id="previewOutput">暂无预览内容</pre>
            </div>
          </div>
        </section>

        <section class="toolbar glass-card">
          <div>
            <h2>模板库</h2>
            <p id="resultSummary" class="muted-text">正在载入模板</p>
          </div>
          <div class="toolbar-actions">
            <select id="sortSelect" aria-label="排序方式">
              <option value="newest">最近更新</option>
              <option value="name">名称排序</option>
              <option value="score">得分优先</option>
            </select>
          </div>
        </section>

        <section id="templateGrid" class="template-grid"></section>

        <section id="emptyState" class="empty-state glass-card hidden">
          <div class="empty-illustration">✧</div>
          <h2>没有找到模板</h2>
          <p>尝试调整搜索关键词，或创建一个新的提示词模板。</p>
          <button id="emptyCreateButton" class="btn btn-primary" type="button">立即新建</button>
        </section>
      </section>
    </main>
  </div>

  <div id="templateModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop"></div>

    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">新建模板</h2>
          <p class="muted-text">沉淀可复用、可评估、可渲染的提示词资产</p>
        </div>
        <button id="closeModalButton" class="icon-button" type="button" aria-label="关闭弹窗">×</button>
      </div>

      <form id="templateForm">
        <input type="hidden" name="id" />

        <div class="form-grid">
          <div class="form-group">
            <label for="templateName">名称</label>
            <input id="templateName" name="name" required placeholder="例如：产品卖点提炼" />
          </div>

          <div class="form-group">
            <label for="templateCategory">分类</label>
            <input id="templateCategory" name="category" placeholder="例如：营销文案" />
          </div>

          <div class="form-group">
            <label for="templateVersion">版本</label>
            <input id="templateVersion" name="version" value="1.0" placeholder="例如：1.0" />
          </div>
        </div>

        <div class="form-grid two">
          <div class="form-group">
            <label for="templateTags">标签（逗号分隔）</label>
            <input id="templateTags" name="tags" placeholder="例如：营销,小红书,转化" />
          </div>

          <div class="form-group">
            <label for="templateVariables">变量（逗号分隔）</label>
            <input id="templateVariables" name="variables" placeholder="例如：产品,受众,语气" />
          </div>
        </div>

        <div class="form-group">
          <label for="templateContent">内容</label>
          <textarea
            id="templateContent"
            name="content"
            rows="9"
            required
            placeholder="请输入模板内容，可使用 {{变量名}} 作为占位符"
          ></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" id="cancelModalButton" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存模板</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
